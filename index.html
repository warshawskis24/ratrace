  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9359170c-3bea-4527-9bab-a6bc2b150ff3\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9a0e2314-a6ad-4276-8e65-9f002acb29e1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b05e3ad3-b72d-434b-b201-cf4222fb4bb0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =========================================================\n   RAT RACE — Toronto's underground scavenger race\n   Aesthetic: retro-arcade meets underground transit signage\n   Display: Geo · Body: Archivo · Accents: Space Mono\n   ========================================================= */\n\n:root {\n  /* concrete / underground base */\n  --ink:      #15120E;\n  --ink-2:    #1E1A14;\n  --ink-3:    #2A241C;\n  --hair:     rgba(242,236,224,.14);\n\n  /* warm paper */\n  --paper:    #F2ECDE;\n  --paper-2:  #E7DCC6;\n  --paper-ink:#211C14;\n  --paper-mut:#6E6452;\n\n  /* transit-signage accent system */\n  --red:    #FF4B36;\n  --amber:  #FFB02E;\n  --blue:   #2E74FF;\n  --green:  #28B765;\n\n  --text-on-dark: #F2ECDE;\n  --text-on-dark-mut: rgba(242,236,224,.62);\n\n  --font-display: 'Geo', system-ui, sans-serif;\n  --font-body:    'Archivo', system-ui, sans-serif;\n  --font-mono:    'Space Mono', ui-monospace, monospace;\n\n  --maxw: 1180px;\n  --gutter: clamp(20px, 5vw, 64px);\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  background: var(--ink);\n  color: var(--text-on-dark);\n  font-family: var(--font-body);\n  font-size: 18px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n}\n\nimg { max-width: 100%; display: block; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gutter); }\n\n/* ---------- type ---------- */\n.display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  line-height: .92;\n  letter-spacing: .01em;\n  text-transform: uppercase;\n}\nh1,h2,h3 { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; margin: 0; }\n\n.kicker {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: .26em;\n  text-transform: uppercase;\n  display: inline-flex;\n  align-items: center;\n  gap: .7em;\n  margin: 0 0 1.4rem;\n}\n.kicker::before {\n  content: \"\";\n  width: 10px; height: 10px;\n  background: var(--accent, var(--red));\n  display: inline-block;\n}\n\n.lead { font-size: clamp(20px, 2.3vw, 27px); line-height: 1.5; }\n\n/* ---------- buttons ---------- */\n.btn {\n  --bg: var(--red);\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-size: 21px;\n  letter-spacing: .04em;\n  color: var(--ink);\n  background: var(--bg);\n  border: none;\n  padding: 16px 30px 14px;\n  display: inline-flex;\n  align-items: center;\n  gap: .6em;\n  cursor: pointer;\n  text-decoration: none;\n  position: relative;\n  white-space: nowrap;\n  box-shadow: 6px 6px 0 rgba(0,0,0,.55);\n  transition: transform .12s ease, box-shadow .12s ease, background .2s ease;\n}\n.btn:hover { transform: translate(-2px,-2px); box-shadow: 9px 9px 0 rgba(0,0,0,.6); }\n.btn:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 rgba(0,0,0,.55); }\n.btn .arrow { font-family: var(--font-body); font-weight: 700; }\n.btn--ghost {\n  background: transparent;\n  color: var(--text-on-dark);\n  box-shadow: inset 0 0 0 2px var(--hair);\n}\n.btn--ghost:hover { box-shadow: inset 0 0 0 2px var(--text-on-dark); }\n\n/* =========================================================\n   NAV\n   ========================================================= */\n.nav {\n  position: fixed;\n  inset: 0 0 auto 0;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px var(--gutter);\n  transition: background .3s ease, border-color .3s ease, padding .3s ease;\n  border-bottom: 1px solid transparent;\n}\n.nav.is-stuck {\n  background: rgba(21,18,14,.86);\n  backdrop-filter: blur(12px);\n  border-bottom-color: var(--hair);\n  padding-top: 10px; padding-bottom: 10px;\n}\n.nav__brand {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-size: 23px;\n  letter-spacing: .04em;\n  color: var(--text-on-dark);\n  text-decoration: none;\n  display: inline-flex;\n  gap: .12em;\n}\n.nav__brand b { font-weight: 400; }\n.nav__brand .c1 { color: var(--red); }\n.nav__brand .c2 { color: var(--amber); }\n.nav__links { display: flex; align-items: center; gap: 30px; }\n.nav__links a {\n  font-family: var(--font-mono);\n  font-size: 12.5px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--text-on-dark-mut);\n  text-decoration: none;\n  transition: color .2s;\n}\n.nav__links a:hover { color: var(--text-on-dark); }\n.nav__cta {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-size: 16px;\n  letter-spacing: .04em;\n  background: var(--red);\n  color: var(--ink);\n  padding: 9px 18px 7px;\n  text-decoration: none;\n  box-shadow: 3px 3px 0 rgba(0,0,0,.5);\n  transition: transform .12s ease;\n}\n.nav__cta:hover { transform: translate(-1px,-1px); }\n.nav__burger { display: none; }\n@media (max-width: 820px) {\n  .nav__links a:not(.nav__cta) { display: none; }\n}\n\n/* =========================================================\n   HERO\n   ========================================================= */\n.hero {\n  position: relative;\n  min-height: 100svh;\n  display: grid;\n  place-items: end center;\n  text-align: center;\n  padding: 120px var(--gutter) clamp(36px, 6vh, 70px);\n  overflow: hidden;\n  background: var(--ink);\n}\n/* full-bleed brand artwork */\n.hero__art {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  object-fit: cover;\n  object-position: 50% 26%;\n  z-index: 0;\n}\n.hero__scrim {\n  position: absolute; inset: 0; z-index: 1;\n  background:\n    linear-gradient(180deg,\n      rgba(21,18,14,.82) 0%,\n      rgba(21,18,14,.30) 18%,\n      rgba(21,18,14,.08) 38%,\n      rgba(21,18,14,.58) 68%,\n      rgba(21,18,14,.98) 100%);\n}\n.hero__inner { position: relative; z-index: 2; width: min(780px, 100%); text-shadow: 0 2px 18px rgba(10,8,6,.55); }\n\n.hero__wordmark {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-weight: 400;\n  font-size: clamp(48px, 9vw, 104px);\n  line-height: .84;\n  letter-spacing: .015em;\n  margin: 0 0 6px;\n  display: flex;\n  gap: .26em;\n  justify-content: center;\n  text-shadow: 0 3px 26px rgba(10,8,6,.7);\n}\n.hero__wordmark .w1 { color: var(--text-on-dark); }\n.hero__wordmark .w2 { color: var(--red); }\n\n.hero__kicker {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: .3em;\n  text-transform: uppercase;\n  color: var(--text-on-dark-mut);\n  margin: 0 0 28px;\n}\n\n/* logo slot */\n.logo-slot {\n  width: min(300px, 72vw);\n  height: 96px;\n  margin: 0 auto 4px;\n  color: var(--text-on-dark);\n}\n.logo-slot:not([data-filled]) {\n  outline: 1.5px dashed rgba(242,236,224,.4);\n  outline-offset: -2px;\n  background: rgba(21,18,14,.5);\n  -webkit-backdrop-filter: blur(2px);\n          backdrop-filter: blur(2px);\n}\n\n.hero__tag {\n  font-family: var(--font-display);\n  text-transform: uppercase;\n  font-size: clamp(34px, 7vw, 78px);\n  line-height: .9;\n  margin: 6px 0 4px;\n}\n.hero__tag .l { display: inline-block; }\n.hero__tag .l1 { color: var(--red); }\n.hero__tag .l2 { color: var(--amber); }\n.hero__tag .l3 { color: var(--blue); }\n.hero__tag .l4 { color: var(--green); }\n\n/* countdown */\n.count { margin: 38px 0 8px; }\n.count__label {\n  font-family: var(--font-mono);\n  font-size: 12.5px;\n  letter-spacing: .24em;\n  text-transform: uppercase;\n  color: var(--text-on-dark-mut);\n  margin: 0 0 16px;\n  display: flex; align-items: center; justify-content: center; gap: .8em;\n}\n.count__label .blink { width: 9px; height: 9px; background: var(--red); border-radius: 50%; animation: blink 1.1s steps(1) infinite; }\n@keyframes blink { 50% { opacity: .15; } }\n\n.count__tiles { display: flex; justify-content: center; gap: 12px; }\n.tile {\n  position: relative;\n  min-width: 92px;\n  padding: 18px 10px 12px;\n  background: var(--ink-2);\n  border: 1px solid var(--hair);\n  box-shadow: inset 0 1px 0 rgba(242,236,224,.05), 0 10px 30px rgba(0,0,0,.4);\n}\n.tile::after {\n  content: \"\";\n  position: absolute; left: 0; right: 0; top: 50%;\n  height: 1px; background: rgba(0,0,0,.5);\n}\n.tile__num {\n  font-family: var(--font-mono);\n  font-size: clamp(34px, 6vw, 50px);\n  font-weight: 700;\n  line-height: 1;\n  letter-spacing: .02em;\n  font-variant-numeric: tabular-nums;\n}\n.tile__lbl {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--text-on-dark-mut);\n  margin-top: 9px;\n}\n.tile:nth-child(1) .tile__num { color: var(--red); }\n.tile:nth-child(2) .tile__num { color: var(--amber); }\n.tile:nth-child(3) .tile__num { color: var(--blue); }\n.tile:nth-child(4) .tile__num { color: var(--green); }\n\n.hero__cta { margin-top: 34px; display: flex; flex-direction: column; align-items: center; gap: 16px; }\n.hero__tick { font-family: var(--font-mono); font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--text-on-dark-mut); }\n\n.scrollcue {\n  position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);\n  font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase;\n  color: var(--text-on-dark-mut); z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px;\n}\n.scrollcue .line { width: 1px; height: 34px; background: linear-gradient(var(--text-on-dark-mut), transparent); animation: drop 1.8s ease-in-out infinite; }\n@keyframes drop { 0%,100% { transform: scaleY(.4); transform-origin: top; opacity:.4 } 50% { transform: scaleY(1); opacity:1 } }\n\n/* =========================================================\n   SECTION SHELLS\n   ========================================================= */\nsection { position: relative; }\n.s-dark  { background: var(--ink); color: var(--text-on-dark); padding: clamp(80px,11vw,150px) 0; }\n.s-paper { background: var(--paper); color: var(--paper-ink); padding: clamp(80px,11vw,150px) 0; }\n.s-paper .kicker { color: var(--paper-ink); }\n.s-paper .lead { color: #3a3225; }\n\n/* hazard divider strip */\n.hazard {\n  height: 16px;\n  background: repeating-linear-gradient(-45deg, var(--amber) 0 22px, var(--ink) 22px 44px);\n}\n\n/* ---------- How it works ---------- */\n.hiw { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(30px,5vw,70px); align-items: center; }\n.hiw__h {\n  font-size: clamp(44px, 7vw, 92px);\n  line-height: .88;\n}\n.hiw__h .em { color: var(--red); }\n.hiw__body p { margin: 0 0 1.2em; }\n.hiw__body .champ { color: var(--paper-ink); }\n@media (max-width: 820px){ .hiw { grid-template-columns: 1fr; } }\n\n/* ---------- How to play (steps) ---------- */\n.play__head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 46px; flex-wrap: wrap; }\n.play__h { font-size: clamp(40px, 6vw, 78px); line-height: .9; }\n.steps { display: grid; gap: 0; }\n.step {\n  display: grid;\n  grid-template-columns: 120px 1fr;\n  gap: 28px;\n  align-items: center;\n  padding: 26px 0;\n  border-top: 1px solid var(--hair);\n}\n.step:last-child { border-bottom: 1px solid var(--hair); }\n.step__n {\n  font-family: var(--font-display);\n  font-size: clamp(46px, 8vw, 80px);\n  line-height: 1;\n  color: var(--n, var(--red));\n}\n.step__t { font-size: clamp(19px, 2.4vw, 26px); line-height: 1.35; max-width: 40ch; }\n.step__t b { font-family: var(--font-display); text-transform: uppercase; font-weight: 400; letter-spacing: .02em; }\n@media (max-width: 620px){ .step { grid-template-columns: 64px 1fr; gap: 16px; } }\n\n/* ---------- Stats ---------- */\n.stats { display: grid; grid-template-columns: repeat(3,1fr); }\n.stat { text-align: center; padding: 18px; border-left: 1px solid var(--hair); }\n.stat:first-child { border-left: none; }\n.stat__n { font-family: var(--font-display); font-size: clamp(54px, 9vw, 110px); line-height: .9; }\n.stat:nth-child(1) .stat__n { color: var(--red); }\n.stat:nth-child(2) .stat__n { color: var(--amber); }\n.stat:nth-child(3) .stat__n { color: var(--blue); }\n.stat__l { font-family: var(--font-mono); font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: var(--text-on-dark-mut); margin-top: 12px; }\n@media (max-width: 700px){ .stats { grid-template-columns: 1fr; } .stat { border-left: none; border-top: 1px solid var(--hair); } .stat:first-child{ border-top: none; } }\n\n/* ---------- Beneath Toronto (atmospheric) ---------- */\n.beneath { display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(28px,5vw,64px); align-items: center; }\n.beneath__h { font-size: clamp(44px, 8vw, 104px); line-height: .86; margin-bottom: 30px; }\n.beneath__h .u { color: var(--amber); }\n.beneath__body p { font-size: clamp(19px,2.2vw,24px); line-height: 1.5; color: var(--text-on-dark); }\n.beneath__body .punch { display: block; color: var(--text-on-dark-mut); font-family: var(--font-mono); font-size: 15px; letter-spacing: .04em; text-transform: uppercase; margin: 22px 0; line-height: 2; }\n.beneath__photo { width: 100%; height: 520px; }\n@media (max-width: 820px){ .beneath { grid-template-columns: 1fr; } .beneath__photo{ height: 360px; } }\n\n/* ---------- Testimonials ---------- */\n.tst__head { margin-bottom: 44px; }\n.tst__grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 22px; }\n.quote {\n  background: var(--paper);\n  color: var(--paper-ink);\n  padding: 38px 36px;\n  position: relative;\n  box-shadow: 8px 8px 0 rgba(0,0,0,.5);\n}\n.quote .mark { font-family: var(--font-display); font-size: 60px; line-height: .6; color: var(--red); }\n.quote p { font-size: clamp(18px,2vw,23px); line-height: 1.5; margin: 14px 0 22px; }\n.quote .who { font-family: var(--font-mono); font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--paper-mut); }\n.quote--mini { display: flex; flex-direction: column; justify-content: center; background: var(--amber); }\n.quote--mini .mark { color: var(--ink); }\n.quote--mini p { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(30px,5vw,54px); line-height: .95; }\n.quote--mini .who { color: rgba(33,28,20,.7); }\n@media (max-width: 760px){ .tst__grid { grid-template-columns: 1fr; } }\n\n/* ---------- Your mission ---------- */\n.mission__head { margin-bottom: 44px; }\n.mission__h { font-size: clamp(38px,6vw,76px); line-height: .9; }\n.mcards { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }\n.mcard {\n  border: 1px solid var(--hair);\n  padding: 30px 26px 34px;\n  min-height: 230px;\n  display: flex; flex-direction: column; justify-content: space-between;\n  background: var(--ink-2);\n  transition: transform .18s ease, border-color .2s ease;\n}\n.mcard:hover { transform: translateY(-4px); border-color: var(--accent, var(--red)); }\n.mcard__tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent, var(--red)); }\n.mcard__t { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(22px,2.6vw,30px); line-height: 1.02; }\n.mcard--more { background: transparent; align-items: center; justify-content: center; text-align: center; }\n.mcard--more .mcard__t { color: var(--text-on-dark-mut); }\n@media (max-width: 820px){ .mcards { grid-template-columns: 1fr; } .mcard{ min-height: 0; } }\n\n/* ---------- About ---------- */\n.about { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(30px,5vw,72px); align-items: center; }\n.about__h { font-size: clamp(40px,6.5vw,86px); line-height: .9; margin-bottom: 26px; }\n.about__h .em { color: var(--red); }\n.about__body p { font-size: clamp(19px,2.1vw,24px); line-height: 1.5; color: #3a3225; margin: 0 0 1.2em; }\n.about__cta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }\n.about .btn { color: var(--paper); }\n.about .btn--ghost { color: var(--paper-ink); box-shadow: inset 0 0 0 2px rgba(33,28,20,.25); }\n.about .btn--ghost:hover { box-shadow: inset 0 0 0 2px var(--paper-ink); }\n@media (max-width: 820px){ .about { grid-template-columns: 1fr; } }\n\n/* =========================================================\n   FOOTER\n   ========================================================= */\n.foot { background: var(--ink); color: var(--text-on-dark); padding: 70px 0 40px; border-top: 1px solid var(--hair); }\n.foot__top { display: flex; justify-content: space-between; align-items: flex-end; gap: 30px; flex-wrap: wrap; }\n.foot__brand { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(52px,11vw,130px); line-height: .82; }\n.foot__brand .c1{color:var(--red)} .foot__brand .c2{color:var(--amber)} .foot__brand .c3{color:var(--blue)} .foot__brand .c4{color:var(--green)}\n.foot__links { display: flex; flex-direction: column; gap: 10px; text-align: right; }\n.foot__links a { font-family: var(--font-mono); font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-on-dark-mut); text-decoration: none; }\n.foot__links a:hover { color: var(--text-on-dark); }\n.foot__bar { margin-top: 50px; padding-top: 22px; border-top: 1px solid var(--hair); display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-on-dark-mut); }\n\n/* reveal on scroll — only armed once JS adds .js-reveal, so content is\n   always visible if the observer never fires (preview/print/no-JS). */\n.js-reveal .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s ease, transform .7s ease; }\n.js-reveal .reveal.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce){ .js-reveal .reveal{ opacity:1 !important; transform:none !important; } * { scroll-behavior:auto; } }\n<\u002Fstyle>\n<script src=\"a124297c-0063-4783-8ad0-d8c71d0dc6d7\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<!-- ============ NAV ============ -->\n<header class=\"nav\">\n  <a class=\"nav__brand\" href=\"#top\"><b class=\"c1\">RAT<\u002Fb><b class=\"c2\">RACE<\u002Fb><\u002Fa>\n  <nav class=\"nav__links\">\n    <a href=\"#how\">How it Works<\u002Fa>\n    <a href=\"#play\">How to Play<\u002Fa>\n    <a href=\"#about\">About<\u002Fa>\n    <a class=\"nav__cta\" href=\"#tickets\">Get Tickets<\u002Fa>\n  <\u002Fnav>\n<\u002Fheader>\n\n<!-- ============ HERO ============ -->\n<section class=\"hero\" id=\"top\">\n  <img class=\"hero__art\" src=\"00b8a07c-005c-471d-8301-d97bfa123b1c\" alt=\"A suited rat racing through the city with a briefcase, kicking a soccer ball\">\n  <div class=\"hero__scrim\"><\u002Fdiv>\n\n  <div class=\"hero__inner\">\n    <h1 class=\"hero__wordmark\"><span class=\"w1\">Rat<\u002Fspan> <span class=\"w2\">Race<\u002Fspan><\u002Fh1>\n\n    <div class=\"count\" id=\"tickets\">\n      <p class=\"count__label\"><span class=\"blink\"><\u002Fspan>Next race · Sun June 14, 2026 · Union Station<\u002Fp>\n      <div class=\"count__tiles\">\n        <div class=\"tile\"><div class=\"tile__num\" id=\"cd-days\">00<\u002Fdiv><div class=\"tile__lbl\">Days<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile\"><div class=\"tile__num\" id=\"cd-hours\">00<\u002Fdiv><div class=\"tile__lbl\">Hrs<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile\"><div class=\"tile__num\" id=\"cd-mins\">00<\u002Fdiv><div class=\"tile__lbl\">Min<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile\"><div class=\"tile__num\" id=\"cd-secs\">00<\u002Fdiv><div class=\"tile__lbl\">Sec<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero__cta\">\n      <a class=\"btn\" href=\"#tickets\">Get Tickets <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <span class=\"hero__tick\">⏱ The clock is ticking<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"hazard\"><\u002Fdiv>\n\n<!-- ============ HOW IT WORKS ============ -->\n<section class=\"s-paper\" id=\"how\">\n  <div class=\"wrap hiw reveal\">\n    <div>\n      <p class=\"kicker\">How it works<\u002Fp>\n      <h2 class=\"hiw__h\">Race<br>the <span class=\"em\">P.A.T.H.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"hiw__body lead\">\n      <p>Navigate the <b>P.A.T.H.<\u002Fb> — Toronto's legendary underground network — as fast as you can, solving clues, uncovering hidden gems, and collecting bonus points as you go.<\u002Fp>\n      <p class=\"champ\">Chase the glory of being crowned <b>P.A.T.H. Champion.<\u002Fb> Hurry — the clock is ticking.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW TO PLAY ============ -->\n<section class=\"s-dark\" id=\"play\">\n  <div class=\"wrap reveal\">\n    <div class=\"play__head\">\n      <h2 class=\"play__h\">How to<br>Play<\u002Fh2>\n      <p class=\"kicker\" style=\"--accent:var(--amber)\">Five steps to the start line<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"steps\">\n      <div class=\"step\" style=\"--n:var(--red)\">\n        <div class=\"step__n\">01<\u002Fdiv>\n        <div class=\"step__t\"><b>Sign up<\u002Fb> to an upcoming event.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\" style=\"--n:var(--amber)\">\n        <div class=\"step__n\">02<\u002Fdiv>\n        <div class=\"step__t\"><b>Check in<\u002Fb> at Union Station by the Clock Tower in the Great Hall.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\" style=\"--n:var(--blue)\">\n        <div class=\"step__n\">03<\u002Fdiv>\n        <div class=\"step__t\">Get your <b>Map + Mission.<\u002Fb> Plan your route with your team.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\" style=\"--n:var(--green)\">\n        <div class=\"step__n\">04<\u002Fdiv>\n        <div class=\"step__t\"><b>Explore the P.A.T.H.<\u002Fb> and complete missions as fast as you can.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\" style=\"--n:var(--red)\">\n        <div class=\"step__n\">05<\u002Fdiv>\n        <div class=\"step__t\">Best teams <b>win prizes<\u002Fb> to iconic Toronto experiences.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ STATS ============ -->\n<section class=\"s-dark\" style=\"padding-top:0\">\n  <div class=\"wrap reveal\">\n    <div class=\"stats\">\n      <div class=\"stat\"><div class=\"stat__n\">200+<\u002Fdiv><div class=\"stat__l\">Teams raced<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat__n\">400k<\u002Fdiv><div class=\"stat__l\">Steps taken<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat__n\">62%<\u002Fdiv><div class=\"stat__l\">Visiting Toronto<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ BENEATH TORONTO ============ -->\n<section class=\"s-dark\" style=\"background:var(--ink-2)\">\n  <div class=\"wrap beneath reveal\">\n    <div>\n      <h2 class=\"beneath__h\">Beneath<br>Toronto is a<br><span class=\"u\">hidden world.<\u002Fspan><\u002Fh2>\n      <div class=\"beneath__body\">\n        <p>Every day, thousands of people walk through the PATH without noticing what's around them.<\u002Fp>\n        <span class=\"beneath__body punch\">Secret passages.<br>Hidden landmarks.<br>Unexpected discoveries.<\u002Fspan>\n        <p>For one day only, the PATH underground becomes <b>Toronto's largest scavenger hunt.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <image-slot id=\"beneath\" class=\"beneath__photo\" shape=\"rect\" placeholder=\"Drop a PATH / underground photo\"><\u002Fimage-slot>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TESTIMONIALS ============ -->\n<section class=\"s-dark\" id=\"testimonials\">\n  <div class=\"wrap reveal\">\n    <div class=\"tst__head\">\n      <p class=\"kicker\" style=\"--accent:var(--green)\">From the racers<\u002Fp>\n      <h2 class=\"play__h\">Word from<br>the tunnels<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"tst__grid\">\n      <figure class=\"quote\" style=\"margin:0\">\n        <div class=\"mark\">“<\u002Fdiv>\n        <p>Thanks for organizing this event! We did this as a family with 2 kids (9 and 12) and had such a fun time. You also introduced us parents to public artworks we've never really taken time to consider. Thank you — we'd love to do this again.<\u002Fp>\n        <figcaption class=\"who\">— Laura Q.<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure class=\"quote quote--mini\" style=\"margin:0\">\n        <div class=\"mark\">“<\u002Fdiv>\n        <p>Fun<br>Times!<\u002Fp>\n        <figcaption class=\"who\">— Ivan O.<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ YOUR MISSION ============ -->\n<section class=\"s-dark\" style=\"background:var(--ink-2)\" id=\"mission\">\n  <div class=\"wrap reveal\">\n    <div class=\"mission__head\">\n      <p class=\"kicker\" style=\"--accent:var(--blue)\">Field briefing<\u002Fp>\n      <h2 class=\"mission__h\">Your mission<br>might include…<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"mcards\">\n      <div class=\"mcard\" style=\"--accent:var(--red)\">\n        <div class=\"mcard__tag\">Mission 01<\u002Fdiv>\n        <div class=\"mcard__t\">Finding a hidden architectural detail<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcard\" style=\"--accent:var(--amber)\">\n        <div class=\"mcard__tag\">Mission 02<\u002Fdiv>\n        <div class=\"mcard__t\">Locating a landmark buried deep in the PATH<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mcard mcard--more\">\n        <div class=\"mcard__t\">…and plenty<br>more surprises<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT ============ -->\n<section class=\"s-paper\" id=\"about\">\n  <div class=\"wrap about reveal\">\n    <div>\n      <p class=\"kicker\">About us<\u002Fp>\n      <h2 class=\"about__h\">Built by people<br>who <span class=\"em\">love Toronto.<\u002Fspan><\u002Fh2>\n      <div class=\"about__body\">\n        <p>And we're looking for people and organizations that also love Toronto, creativity, exploration, and community. If that sounds like you, we'd love to talk.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"about__h\" style=\"font-size:clamp(28px,3.6vw,44px);line-height:1.02;margin-bottom:54px\">Help us build Toronto's next great urban adventure.<\u002Fh3>\n      <div class=\"about__cta\">\n        <a class=\"btn\" href=\"#tickets\">Get Tickets <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n        <a class=\"btn btn--ghost\" href=\"mailto:hello@ratrace.to\">Get in touch<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div class=\"foot__top\">\n      <div class=\"foot__brand\"><span class=\"c1\">RAT<\u002Fspan><span class=\"c2\">RACE<\u002Fspan><\u002Fdiv>\n      <div class=\"foot__links\">\n        <a href=\"#how\">How it Works<\u002Fa>\n        <a href=\"#play\">How to Play<\u002Fa>\n        <a href=\"#mission\">Your Mission<\u002Fa>\n        <a href=\"#about\">About<\u002Fa>\n        <a href=\"#tickets\">Get Tickets<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot__bar\">\n      <span>© 2026 Rat Race — Toronto<\u002Fspan>\n      <span>The clock is ticking ⏱<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"3b20880c-f08c-4c01-b140-1789c61e0cce\"><\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
